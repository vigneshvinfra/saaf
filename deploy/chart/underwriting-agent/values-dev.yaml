# dev — smallest footprint, Anthropic API (key in Secrets Manager), auto-synced.
replicaCount: 1

image:
  # repository inherited from values.yaml (GHCR). CD bumps tag to the git SHA.
  tag: ""

config:
  ENVIRONMENT: dev
  LOG_LEVEL: DEBUG
  LLM_PROVIDER: anthropic
  AWS_REGION: us-east-1
  S3_BUCKET: saaf-uw-dev-loan-docs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4317
secrets:
  enabled: true
  region: us-east-1
  objects:
    - arn: "" # arn:aws:secretsmanager:...:secret:saaf-uw/dev/database-url
      envVar: DATABASE_URL
    - arn: "" # arn:aws:secretsmanager:...:secret:saaf-uw/dev/anthropic-api-key
      envVar: ANTHROPIC_API_KEY
ingress:
  enabled: true
  scheme: internal
  host: agent.dev.internal.saaffinance.com
  certificateArn: "" # ACM cert ARN
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 65
serviceMonitor:
  enabled: true
