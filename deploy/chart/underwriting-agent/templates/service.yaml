apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent.name" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "agent.selectorLabels" . | nindent 4 }}
