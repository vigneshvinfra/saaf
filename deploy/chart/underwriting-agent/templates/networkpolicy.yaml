{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agent.name" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only the ALB / in-VPC callers reach the HTTP port.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: http
          protocol: TCP
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Postgres (RDS) inside the VPC
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 5432
          protocol: TCP
    # HTTPS to AWS service endpoints (S3/DynamoDB/Secrets Manager/STS/KMS/Bedrock),
    # the GHCR registry, and the Anthropic API in non-prod. Egress is further
    # constrained at the VPC/SG/endpoint-policy layer in Terraform.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 443
          protocol: TCP
{{- end }}
