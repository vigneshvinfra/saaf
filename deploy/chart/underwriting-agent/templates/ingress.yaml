{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agent.name" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.probes.readiness.path }}
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # TLS 1.2+ only (compliance: encryption in transit).
    alb.ingress.kubernetes.io/ssl-policy: {{ .Values.ingress.sslPolicy }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    {{- if .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "agent.name" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
