{{- if .Values.secrets.enabled }}
# Secrets Store CSI driver (AWS provider). Each Secrets Manager object is
# materialized into a Kubernetes Secret via secretObjects, which the pod loads
# through envFrom. Terraform owns the secret VALUES (rotation-safe); this just
# references them by ARN. The pod's EKS Pod Identity role grants read access
# scoped to exactly these ARNs.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "agent.name" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  provider: aws
  parameters:
    region: {{ .Values.secrets.region }}
    objects: |
      {{- range .Values.secrets.objects }}
      - objectName: {{ .arn | quote }}
        objectType: secretsmanager
        objectAlias: {{ .envVar | quote }}
      {{- end }}
  secretObjects:
    - secretName: {{ .Values.secrets.k8sSecretName }}
      type: Opaque
      data:
        {{- range .Values.secrets.objects }}
        - objectName: {{ .envVar | quote }}
          key: {{ .envVar | quote }}
        {{- end }}
{{- end }}
