# AppProject — This is kept separate from the `underwriting-agent` project, which is namespaced-only and must never create cluster-scoped objects. 
# These charts (Karpenter, LB Controller, Secrets Store CSI, kube-prometheus-stack) install CRDs, ClusterRoles, etc., so they need this  wider grant — but still scoped to platform namespaces and trusted chart repos.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Cluster platform controllers + CRDs (Karpenter, LBC, CSI, monitoring)

  # specific upstream Helm repos. No wildcards here.
  sourceRepos:
    - https://github.com/<your-org>/saaf-underwriting-infra.git
    - https://aws.github.io/eks-charts
    - https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
    - https://aws.github.io/secrets-store-csi-driver-provider-aws
    - https://prometheus-community.github.io/helm-charts
    - public.ecr.aws/karpenter

  # Platform components land in these namespaces only.
  destinations:
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: kube-system
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: monitoring

  # Cluster-scoped resources ARE permitted here (CRDs, ClusterRole(Binding),
  # ValidatingWebhookConfiguration, Karpenter NodePool/EC2NodeClass, ...).
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
