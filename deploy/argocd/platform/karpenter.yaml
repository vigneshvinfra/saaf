# Karpenter controller - This installs the controller pod that consumes them;
#  SA `karpenter` is already bound to the controller role via the Pod Identity association.
#
# Substitute <CLUSTER_NAME> and <INTERRUPTION_QUEUE> from `terraform output`
# (stack outputs: cluster_name, karpenter_interruption_queue). Pin the version.
#
# The NodePool + EC2NodeClass this controller consumes are delivered separately
# by the `cluster-resources` app at sync-wave 1 (after this chart's CRDs exist).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.1.1
    helm:
      releaseName: karpenter
      values: |
        settings:
          clusterName: <CLUSTER_NAME>
          interruptionQueue: <INTERRUPTION_QUEUE>
        serviceAccount:
          create: true
          name: karpenter        # must match the Pod Identity association
        replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
