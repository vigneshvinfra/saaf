# Secrets Store CSI Driver + the AWS provider.
# provider: aws) that mounts DATABASE_URL / ANTHROPIC_API_KEY from AWS Secrets Manager. 
# Without both, the agent pods can't mount their secrets and won't start.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-store-csi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - repoURL: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
      chart: secrets-store-csi-driver
      targetRevision: 1.4.6
      helm:
        releaseName: secrets-store-csi-driver
        values: |
          syncSecret:
            enabled: true
          enableSecretRotation: true
    - repoURL: https://aws.github.io/secrets-store-csi-driver-provider-aws
      chart: secrets-store-csi-driver-provider-aws
      targetRevision: 0.3.9
      helm:
        releaseName: secrets-store-csi-driver-provider-aws
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
