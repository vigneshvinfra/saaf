# ApplicationSet — fans out one Argo Application per environment from a single  definition. 
# dev auto-syncs (self-healing); prod is manual so a human
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: underwriting-agent
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - env: dev
            namespace: uw-dev
            server: https://kubernetes.default.svc
            autoSync: "true"
          - env: prod
            namespace: uw-prod
            server: https://kubernetes.default.svc
            autoSync: "false"
  template:
    metadata:
      name: underwriting-agent-{{.env}}
      labels:
        env: "{{.env}}"
    spec:
      project: underwriting-agent
      source:
        repoURL: https://github.com/<your-org>/saaf-underwriting-infra.git
        targetRevision: main
        path: deploy/chart/underwriting-agent
        helm:
          releaseName: underwriting-agent
          valueFiles:
            - values.yaml
            - values-{{.env}}.yaml
      destination:
        server: "{{.server}}"
        namespace: "{{.namespace}}"
      # Base policy applies to every env. Automated sync is patched in below
      # only for the environments whose element sets autoSync=true.
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 3m
  templatePatch: |
    {{- if eq .autoSync "true" }}
    spec:
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
    {{- end }}
