{{- if not .Values.clusterName }}{{ fail "clusterName is required — set it from `terraform output cluster_name`" }}{{- end }}
{{- if not .Values.karpenterNodeRole }}{{ fail "karpenterNodeRole is required — set it from `terraform output karpenter_node_role_name`" }}{{- end }}
# Karpenter NodePool + EC2NodeClass for the agent workload nodes. The node IAM
# role + discovery tags come from the Terraform karpenter/eks modules.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: agent
spec:
  template:
    metadata:
      labels:
        saaf.io/node-role: workload
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: {{ .Values.karpenter.capacityTypes | toJson }}
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: {{ .Values.karpenter.instanceCategories | toJson }}
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["{{ .Values.karpenter.minInstanceGeneration }}"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: agent
      # Recycle nodes regularly so they stay patched (security hygiene).
      expireAfter: {{ .Values.karpenter.expireAfter }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.karpenter.consolidateAfter }}
  limits:
    cpu: "{{ .Values.karpenter.cpuLimit }}"
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: agent
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: {{ .Values.karpenterNodeRole }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName }}
  # Encrypted, right-sized root volume.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ .Values.karpenter.rootVolumeSizeGi }}Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    httpTokens: required # IMDSv2 only
