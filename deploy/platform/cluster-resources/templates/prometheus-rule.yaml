# SLO + health alerts for the agent. Fires into Alertmanager (kube-prometheus-
# stack). The first rule is the runbook's headline incident: LLM-driven p95
# breach. Metric names assume the OpenTelemetry FastAPI instrumentation the agent
# ships with, exported to Prometheus (http_server_duration_milliseconds_*).
# Namespace is the chart release namespace (monitoring).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: underwriting-agent-slo
  labels:
    release: {{ .Values.prometheus.releaseLabel }}
spec:
  groups:
    - name: underwriting-agent.slo
      rules:
        # ---- p95 end-to-end latency SLO ----------------------------------
        - alert: AgentP95LatencyHigh
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_server_duration_milliseconds_bucket{service="underwriting-agent"}[5m]))
            ) > {{ .Values.prometheus.p95LatencyMillis }}
          for: 10m
          labels:
            severity: page
          annotations:
            summary: "Underwriting agent p95 latency high"
            description: "p95 end-to-end latency has exceeded the SLO for 10m. Almost always upstream LLM latency."
            runbook_url: "{{ .Values.prometheus.runbookUrl }}"

        # ---- LLM error / timeout rate ------------------------------------
        - alert: AgentLLMErrorRateHigh
          expr: |
            sum(rate(http_server_duration_milliseconds_count{service="underwriting-agent",http_status_code="502"}[5m]))
            /
            sum(rate(http_server_duration_milliseconds_count{service="underwriting-agent"}[5m])) > {{ .Values.prometheus.llmErrorRatio }}
          for: 5m
          labels:
            severity: page
          annotations:
            summary: "Agent LLM call failure rate high"
            description: "Too many requests are returning 502 (LLM call failed). See RUNBOOK.md."
            runbook_url: "{{ .Values.prometheus.runbookUrl }}"

        # ---- availability ------------------------------------------------
        - alert: AgentNoReadyPods
          expr: |
            kube_deployment_status_replicas_available{deployment="underwriting-agent"} == 0
          for: 2m
          labels:
            severity: page
          annotations:
            summary: "No ready underwriting-agent pods"
            description: "The agent has zero available replicas — service is down."
