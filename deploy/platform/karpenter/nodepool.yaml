# Karpenter NodePool + EC2NodeClass for the agent workload nodes.
# Delivered via GitOps (Argo CD platform app). The IAM node role + discovery
# tags come from the Terraform `karpenter` / `eks` modules — substitute the two
# placeholders below from `terraform output` (envsubst in the platform app, or
# commit per-env copies):
#   ${CLUSTER_NAME}        -> stack output cluster_name
#   ${KARPENTER_NODE_ROLE} -> stack output karpenter_node_role_name
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: agent
spec:
  template:
    metadata:
      labels:
        saaf.io/node-role: workload
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        # Prefer spot for cost; fall back to on-demand under pressure.
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: agent
      # Recycle nodes regularly so they stay patched (security hygiene).
      expireAfter: 336h # 14d
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "200" # hard ceiling on the pool's total provisioned vCPU
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: agent
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: ${KARPENTER_NODE_ROLE}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${CLUSTER_NAME}
  # Encrypted, right-sized root volume.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  metadataOptions:
    httpTokens: required # IMDSv2 only
