[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "underwriting-agent"
version = "0.1.0"
description = "Saaf Finance — underwriting-assist agent (reference skeleton for take-home interview)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Saaf Finance Engineering" }]

dependencies = [
  "fastapi>=0.111",
  "uvicorn[standard]>=0.30",
  "pydantic>=2.7",
  "pydantic-settings>=2.3",
  "anthropic>=0.34",
  "boto3>=1.34",
  "sqlalchemy>=2.0",
  "psycopg[binary]>=3.1",
  "structlog>=24.1",
  "opentelemetry-api>=1.25",
  "opentelemetry-sdk>=1.25",
  "opentelemetry-instrumentation-fastapi>=0.46b0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "httpx>=0.27",
  "ruff>=0.5",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
# src/agent is vendored byte-for-byte from Saaf-Finance/devops-build-exercise.
# Do not modify it; don't enforce our lint rules on it either.
extend-exclude = ["src/agent"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
